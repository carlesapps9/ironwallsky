name: Android Release Build

# Produces a signed AAB (Play Store) and a signed APK (sideload/test).
# Triggered automatically after CI passes on main, or manually from Actions tab.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   RELEASE_KEYSTORE_BASE64   — base64-encoded ironwallsky-release.jks
#   RELEASE_STORE_PASSWORD    — keystore store password
#   RELEASE_KEY_ALIAS         — key alias (ironwallsky)
#   RELEASE_KEY_PASSWORD      — key password
#   VITE_ADMOB_APP_ID_ANDROID — ca-app-pub-xxxx~yyyy
#   VITE_ADMOB_INTERSTITIAL_ANDROID — ca-app-pub-xxxx/yyyy
#   VITE_ADMOB_REWARDED_ANDROID     — ca-app-pub-xxxx/yyyy
#
# Encode the keystore locally with:
#   [Convert]::ToBase64String([IO.File]::ReadAllBytes('ironwallsky-release.jks')) | Set-Clipboard
on:
  # Only run after CI workflow succeeds on main — real gate, not a placeholder.
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      build_apk:
        description: 'Also build debug/test APK'
        required: false
        default: 'true'
        type: boolean

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '25'
  NODE_VERSION: '20'
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Main build job — skipped automatically if CI did not succeed
  # ────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build Signed AAB
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Node (Vite build) ─────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      # ── 3. Java (Gradle) ─────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      # ── 4. Android SDK ───────────────────────────────────────────────────
      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      # ── 5. Keystore ──────────────────────────────────────────────────────
      - name: Decode release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > ironwallsky-release.jks
          echo "Keystore decoded: $(wc -c < ironwallsky-release.jks) bytes"

      - name: Convert keystore to JKS for AGP/BouncyCastle compatibility
        # AGP 8.x bundles its own BouncyCastle which can't parse PKCS12
        # keystores created by JDK 17+ (extended ASN.1 tags >30). The JDK
        # keytool reads the PKCS12 using the JDK's own provider (not BC),
        # then writes JKS which every BC version supports.
        run: |
          keytool -importkeystore \
            -srckeystore ironwallsky-release.jks \
            -destkeystore ironwallsky-release-compat.jks \
            -srcstoretype PKCS12 \
            -deststoretype JKS \
            -srcstorepass "${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -deststorepass "${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -noprompt
          echo "Converted to JKS: $(wc -c < ironwallsky-release-compat.jks) bytes"

      - name: Write keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=../../ironwallsky-release-compat.jks
          storePassword=${{ secrets.RELEASE_STORE_PASSWORD }}
          keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}
          keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}
          storeType=JKS
          EOF

      # ── 6. Web bundle (production — real ads, no test mode) ──────────────
      - name: Build Vite production bundle
        run: npm run build
        env:
          VITE_ADMOB_TESTING: 'false'
          VITE_ADMOB_APP_ID_ANDROID: ${{ secrets.VITE_ADMOB_APP_ID_ANDROID }}
          VITE_ADMOB_INTERSTITIAL_ANDROID: ${{ secrets.VITE_ADMOB_INTERSTITIAL_ANDROID }}
          VITE_ADMOB_REWARDED_ANDROID: ${{ secrets.VITE_ADMOB_REWARDED_ANDROID }}
          VITE_ADMOB_APP_ID_IOS: ${{ secrets.VITE_ADMOB_APP_ID_IOS }}
          VITE_ADMOB_INTERSTITIAL_IOS: ${{ secrets.VITE_ADMOB_INTERSTITIAL_IOS }}
          VITE_ADMOB_REWARDED_IOS: ${{ secrets.VITE_ADMOB_REWARDED_IOS }}

      - name: Capacitor sync (Android)
        run: npx cap sync android

      # ── 7. Gradle permissions ────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 8. AAB (Play Store) ──────────────────────────────────────────────
      - name: Build signed release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-${{ github.sha }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── 8b. Native debug symbols ─────────────────────────────────────────
      - name: Upload native debug symbols artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-debug-symbols-${{ github.sha }}
          path: android/app/build/outputs/native-debug-symbols/release/native-debug-symbols.zip
          retention-days: 30
          if-no-files-found: warn

      # ── 9. APK (sideload / internal testing) — optional ─────────────────
      - name: Build signed release APK
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_apk == 'true' || github.event_name == 'push' }}
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_apk == 'true' || github.event_name == 'push' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14

      # ── 10. Build summary ────────────────────────────────────────────────
      - name: Print build summary
        if: always()
        run: |
          echo "## Android Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          AAB="android/app/build/outputs/bundle/release/app-release.aab"
          APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$AAB" ]; then
            SIZE=$(du -sh "$AAB" | cut -f1)
            echo "✅ **AAB** (Play Store): \`$SIZE\`  — artifact: \`app-release-aab-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ AAB build failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "$APK" ]; then
            SIZE=$(du -sh "$APK" | cut -f1)
            echo "✅ **APK** (sideload): \`$SIZE\`  — artifact: \`app-release-apk-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          SYMBOLS="android/app/build/outputs/native-debug-symbols/release/native-debug-symbols.zip"
          if [ -f "$SYMBOLS" ]; then
            SIZE=$(du -sh "$SYMBOLS" | cut -f1)
            echo "✅ **Native debug symbols**: \`$SIZE\`  — artifact: \`native-debug-symbols-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Native debug symbols not found (no native .so files, or ndk config missing)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\` by **${{ github.actor }}**" >> $GITHUB_STEP_SUMMARY
